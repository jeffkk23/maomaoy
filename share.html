<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>毛毛医 · 扫码体验</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(160deg,#FFF3EE 0%,#FFF8F3 40%,#EEF2FF 100%);font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:32px;padding:40px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(255,107,53,.12),0 4px 20px rgba(0,0,0,.06)}
.icon{width:80px;height:80px;border-radius:22px;background:linear-gradient(135deg,#FF6B35,#FF4500);display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 16px;box-shadow:0 12px 32px rgba(255,107,53,.3)}
h1{font-size:28px;font-weight:800;color:#1A1A1A;margin-bottom:6px;letter-spacing:-0.5px}
.tagline{font-size:14px;color:#666;line-height:1.6;margin-bottom:28px}
.qr-wrap{background:#FFF8F3;border-radius:20px;padding:24px;margin-bottom:24px;border:1.5px solid #F0EBE3}
.qr-wrap img{width:200px;height:200px;border-radius:12px}
.qr-hint{font-size:13px;color:#FF6B35;font-weight:600;margin-top:12px}
.features{display:flex;gap:12px;margin-bottom:24px}
.feat{flex:1;background:#FFF8F3;border-radius:14px;padding:14px 8px;text-align:center}
.feat-icon{font-size:24px;margin-bottom:6px}
.feat-text{font-size:11px;color:#666;font-weight:500}
.link{font-size:12px;color:#AAA;word-break:break-all;line-height:1.6}
.link a{color:#FF6B35;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🐾</div>
  <h1>毛毛医</h1>
  <div class="tagline">懂你毛孩的那位医生<br>AI 健康档案 · 照片问诊 · 情绪追踪</div>
  <div class="qr-wrap">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://jeffkk23.github.io/maomaoy/" alt="扫码体验毛毛医">
    <div class="qr-hint">微信扫码 · 立即体验</div>
  </div>
  <div class="features">
    <div class="feat"><div class="feat-icon">📋</div><div class="feat-text">专属健康档案</div></div>
    <div class="feat"><div class="feat-icon">📷</div><div class="feat-text">AI照片问诊</div></div>
    <div class="feat"><div class="feat-icon">😊</div><div class="feat-text">每日情绪检测</div></div>
  </div>
  <div class="link">或直接访问：<a href="https://jeffkk23.github.io/maomaoy/">jeffkk23.github.io/maomaoy</a></div>
</div>
</body>
</html>
